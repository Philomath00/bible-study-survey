<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Study Survey</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #6C5CE7;
    --primary-light: #A29BFE;
    --primary-dark: #4A3DB8;
    --accent: #00CEC9;
    --bg-start: #0F0C29;
    --bg-mid: #1A1245;
    --bg-end: #24243E;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.1);
    --text: #FFFFFF;
    --text-secondary: rgba(255,255,255,0.55);
    --text-dim: rgba(255,255,255,0.35);
    --success: #00B894;
    --error: #FF6B6B;
    --option-hover: rgba(108,92,231,0.15);
    --option-selected: rgba(108,92,231,0.25);
    --option-border-selected: rgba(108,92,231,0.7);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* Animated background particles */
  .bg-particles {
    position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
  }
  .bg-particles .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12;
    animation: float 20s ease-in-out infinite;
  }
  .bg-particles .orb:nth-child(1) {
    width: 500px; height: 500px; background: var(--primary);
    top: -10%; left: -10%; animation-delay: 0s;
  }
  .bg-particles .orb:nth-child(2) {
    width: 400px; height: 400px; background: var(--accent);
    bottom: -15%; right: -10%; animation-delay: -7s;
  }
  .bg-particles .orb:nth-child(3) {
    width: 300px; height: 300px; background: #FD79A8;
    top: 40%; left: 60%; animation-delay: -14s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* Layout */
  .survey-app {
    position: relative; z-index: 1;
    height: 100vh; display: flex; flex-direction: column;
  }

  /* Top bar */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 2rem; flex-shrink: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 0.65rem;
    font-weight: 700; font-size: 1rem; letter-spacing: -0.01em;
  }
  .brand-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .progress-info {
    font-size: 0.8rem; color: var(--text-secondary); font-weight: 500;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .progress-count { font-variant-numeric: tabular-nums; }

  /* Progress bar */
  .progress-track {
    height: 3px; background: rgba(255,255,255,0.08);
    flex-shrink: 0; position: relative; overflow: hidden;
  }
  .progress-fill {
    position: absolute; inset: 0; right: 100%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: right 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .progress-fill::after {
    content: ''; position: absolute; right: 0; top: -2px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
  }

  /* Slide container */
  .slides-viewport {
    flex: 1; overflow: hidden; position: relative;
  }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    opacity: 0; transform: translateY(60px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }
  .slide.active {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }
  .slide.exit-up {
    opacity: 0; transform: translateY(-60px);
  }
  .slide.exit-down {
    opacity: 0; transform: translateY(60px);
  }

  .slide-inner {
    width: 100%; max-width: 640px;
  }

  /* Welcome slide */
  .welcome-content { text-align: center; }
  .welcome-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem; font-size: 38px;
    box-shadow: 0 8px 32px rgba(108,92,231,0.35);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 8px 32px rgba(108,92,231,0.35); }
    50% { box-shadow: 0 8px 48px rgba(108,92,231,0.55); }
  }
  .welcome-content h1 {
    font-size: 2.4rem; font-weight: 800; letter-spacing: -0.03em;
    line-height: 1.15; margin-bottom: 0.75rem;
    background: linear-gradient(135deg, #fff 30%, var(--primary-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .welcome-content p {
    color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6;
    max-width: 440px; margin: 0 auto 2.5rem;
  }
  .welcome-meta {
    display: flex; justify-content: center; gap: 2rem;
    color: var(--text-dim); font-size: 0.85rem; margin-bottom: 2.5rem;
  }
  .welcome-meta span { display: flex; align-items: center; gap: 0.4rem; }

  /* Question slide */
  .q-number {
    font-size: 0.8rem; font-weight: 600; color: var(--primary-light);
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .q-number::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--primary-light) 0%, transparent 100%);
    opacity: 0.3;
  }
  .q-text {
    font-size: 1.65rem; font-weight: 700; line-height: 1.3;
    letter-spacing: -0.02em; margin-bottom: 0.5rem;
  }
  .q-hint {
    font-size: 0.88rem; color: var(--text-dim); margin-bottom: 2rem;
  }

  /* Options */
  .options-grid { display: flex; flex-direction: column; gap: 0.65rem; }

  .opt-btn {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 14px;
    cursor: pointer; transition: all 0.2s ease;
    color: var(--text); font-size: 0.95rem; font-weight: 400;
    text-align: left; width: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  .opt-btn:hover {
    background: var(--option-hover);
    border-color: rgba(108,92,231,0.4);
    transform: translateX(4px);
  }
  .opt-btn.selected {
    background: var(--option-selected);
    border-color: var(--option-border-selected);
    font-weight: 500;
  }
  .opt-btn.selected .opt-key {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }

  .opt-key {
    width: 30px; height: 30px; flex-shrink: 0;
    border: 1.5px solid var(--card-border);
    border-radius: 8px; font-size: 0.75rem; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--text-secondary);
  }
  .opt-text { flex: 1; }
  .opt-check {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.5);
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: var(--primary);
  }
  .opt-btn.selected .opt-check {
    opacity: 1; transform: scale(1);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.9rem 2rem;
    border-radius: 12px; border: none;
    font-family: inherit; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.25s ease;
    letter-spacing: 0.01em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow: 0 4px 20px rgba(108,92,231,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(108,92,231,0.5);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed; transform: none;
    box-shadow: 0 4px 20px rgba(108,92,231,0.2);
  }

  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }

  .btn-icon {
    font-size: 1.1rem; line-height: 1; display: flex; align-items: center;
  }

  /* Navigation */
  .nav-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 2.5rem;
  }
  .nav-row .nav-hint {
    font-size: 0.78rem; color: var(--text-dim);
  }
  .nav-row .nav-hint kbd {
    display: inline-block; padding: 0.15em 0.45em;
    background: rgba(255,255,255,0.08); border-radius: 4px;
    font-family: inherit; font-size: 0.85em;
    border: 1px solid rgba(255,255,255,0.12);
  }

  /* Bottom bar */
  .bottom-bar {
    flex-shrink: 0; padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-arrows { display: flex; gap: 0.4rem; }
  .nav-arrow {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 1.1rem;
  }
  .nav-arrow:hover:not(:disabled) {
    background: rgba(255,255,255,0.12); color: var(--text);
  }
  .nav-arrow:disabled { opacity: 0.25; cursor: not-allowed; }
  .powered-by {
    font-size: 0.72rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.35rem;
  }

  /* Success screen */
  .success-content { text-align: center; }
  .success-anim {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, var(--success), #00CEC9);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 2rem;
    box-shadow: 0 8px 40px rgba(0,184,148,0.4);
    animation: success-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes success-pop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .success-anim svg { width: 44px; height: 44px; }
  .success-content h2 {
    font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .success-content p {
    color: var(--text-secondary); font-size: 1rem; line-height: 1.6;
  }
  .confetti-wrap {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
  }

  /* Spinner */
  .spinner-sm {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 5rem; left: 50%;
    transform: translateX(-50%) translateY(30px);
    background: var(--error); color: #fff;
    padding: 0.65rem 1.5rem; border-radius: 99px;
    font-size: 0.85rem; font-weight: 500;
    opacity: 0; transition: all 0.35s ease; z-index: 999;
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(255,107,107,0.4);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .top-bar { padding: 1rem 1.25rem; }
    .bottom-bar { padding: 0.75rem 1.25rem; }
    .slide { padding: 1.5rem 1.25rem; }
    .welcome-content h1 { font-size: 1.8rem; }
    .q-text { font-size: 1.3rem; }
    .welcome-meta { gap: 1rem; font-size: 0.78rem; }
    .nav-row .nav-hint { display: none; }
  }
</style>
</head>
<body>

<div class="bg-particles">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="survey-app">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon">📖</div>
      <span>Bible Study Survey</span>
    </div>
    <div class="progress-info">
      <span class="progress-count" id="progressCount">0 / 7</span>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- Slides -->
  <div class="slides-viewport" id="slidesViewport"></div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="nav-arrows">
      <button class="nav-arrow" id="btnPrev" onclick="goToPrev()" disabled>
        <span>&#8593;</span>
      </button>
      <button class="nav-arrow" id="btnNext" onclick="goToNext()">
        <span>&#8595;</span>
      </button>
    </div>
    <div class="powered-by">
      Powered by <strong style="color:var(--text-secondary)">Faith+</strong>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confetti-wrap" id="confettiWrap"></div>

<script>
/* ──── Config ──── */
const EMAILJS_SERVICE   = 'service_m4o2e9c';
const EMAILJS_TEMPLATE  = 'template_12romw7';
const EMAILJS_PUBLIC_KEY = 'lg0ftn-4yhzGRftwi';
const TO_EMAIL = 'dolajulius66@gmail.com';

const questions = [
  { id:1, text:"How often do you read or study the Bible?", type:"single",
    options:["Daily","A few times a week","Occasionally","Rarely","Never"] },
  { id:2, text:"How do you currently study the Bible?", hint:"Select all that apply", type:"multi",
    options:["Personal reading","Devotional books","Church or group study","Bible apps","I don't have a consistent method"] },
  { id:3, text:"What is your biggest challenge when studying the Bible?", hint:"Select all that apply", type:"multi",
    options:["Staying consistent","Understanding the content","Remembering verses","Staying engaged (it feels boring or repetitive)","Lack of structure or guidance"] },
  { id:4, text:"Which of these would make Bible study more engaging for you?", hint:"Select up to 2", type:"multi", max:2,
    options:["Quizzes and challenges","Memory verse games","Completing missing scriptures","Progress tracking (levels, streaks, rewards)","Age-based or level-based learning paths"] },
  { id:5, text:"Who would you primarily use this type of platform for?", type:"single",
    options:["Myself","My children","Youth/teenagers","Church or group members","I would not use it"] },
  { id:6, text:"Would you be willing to pay for a structured, interactive Bible learning platform?", type:"single",
    options:["Yes (monthly subscription)","Yes (one-time payment)","Only if there is a free version with limited features","No"] },
  { id:7, text:"If yes, what price range feels reasonable per month?", type:"single",
    options:["$1 \u2013 $3","$4 \u2013 $7","$8 \u2013 $12","I would only use a free version"] }
];

const responses = {};
let currentSlide = 0;            // 0 = welcome, 1-7 = questions, 8 = success
const totalSlides = questions.length + 2;   // welcome + questions + success
const keys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

/* ──── Build slides ──── */
function buildSlides() {
  const vp = document.getElementById('slidesViewport');

  // Welcome slide
  const welcome = el('div',{class:'slide active','data-idx':'0'});
  welcome.innerHTML = `
    <div class="slide-inner">
      <div class="welcome-content">
        <div class="welcome-icon">📖</div>
        <h1>Bible Study Experience Survey</h1>
        <p>Help us understand how to make Bible learning more engaging for you. It takes about 2 minutes.</p>
        <div class="welcome-meta">
          <span>&#9201; 2 min</span>
          <span>&#128221; 7 questions</span>
        </div>
        <button class="btn btn-primary" onclick="goToNext()">
          Start Survey <span class="btn-icon">&#8594;</span>
        </button>
      </div>
    </div>`;
  vp.appendChild(welcome);

  // Question slides
  questions.forEach((q, i) => {
    const slide = el('div',{class:'slide','data-idx': String(i+1)});
    let optionsHtml = q.options.map((opt, oi) => `
      <button class="opt-btn" data-qid="${q.id}" data-val="${esc(opt)}" onclick="selectOption(this,${q.id},${q.type==='multi'})">
        <span class="opt-key">${keys[oi]}</span>
        <span class="opt-text">${esc(opt)}</span>
        <span class="opt-check">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <polyline points="3,7 6,10 11,4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>`).join('');

    slide.innerHTML = `
      <div class="slide-inner">
        <div class="q-number">Question ${q.id} of ${questions.length}</div>
        <div class="q-text">${esc(q.text)}</div>
        ${q.hint ? `<div class="q-hint">${esc(q.hint)}</div>` : '<div style="margin-bottom:2rem"></div>'}
        <div class="options-grid">${optionsHtml}</div>
        <div class="nav-row">
          <div class="nav-hint">Press <kbd>Enter</kbd> to continue</div>
          <button class="btn btn-primary" onclick="goToNext()" id="okBtn${q.id}">
            OK <span class="btn-icon">&#10003;</span>
          </button>
        </div>
      </div>`;
    vp.appendChild(slide);
  });

  // Success slide
  const success = el('div',{class:'slide','data-idx': String(questions.length+1)});
  success.innerHTML = `
    <div class="slide-inner">
      <div class="success-content">
        <div class="success-anim">
          <svg viewBox="0 0 44 44" fill="none">
            <polyline points="12,22 20,30 32,14" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Thank you!</h2>
        <p>Your responses have been submitted and a CSV copy has been sent to our inbox. We truly appreciate your time and feedback.</p>
      </div>
    </div>`;
  vp.appendChild(success);
}

/* ──── Navigation ──── */
function goTo(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  const slides = document.querySelectorAll('.slide');
  const dir = idx > currentSlide ? 'up' : 'down';

  slides.forEach((s,i) => {
    s.classList.remove('active','exit-up','exit-down');
    if (i === currentSlide) s.classList.add(dir === 'up' ? 'exit-up' : 'exit-down');
    if (i === idx) {
      s.classList.add('active');
      // Reset transform for entering
      s.style.transform = '';
    }
  });

  currentSlide = idx;
  updateProgress();
  updateNav();
}

function goToNext() {
  // If on a question slide, validate
  if (currentSlide >= 1 && currentSlide <= questions.length) {
    const qid = questions[currentSlide - 1].id;
    if (!responses[qid] || responses[qid].length === 0) {
      showToast('Please select an answer to continue');
      return;
    }
  }
  // If on last question, submit
  if (currentSlide === questions.length) {
    submitSurvey();
    return;
  }
  goTo(currentSlide + 1);
}

function goToPrev() {
  if (currentSlide > 0) goTo(currentSlide - 1);
}

function updateProgress() {
  const answered = Object.keys(responses).length;
  document.getElementById('progressCount').textContent = `${answered} / ${questions.length}`;
  const pct = (answered / questions.length) * 100;
  document.getElementById('progressFill').style.right = (100 - pct) + '%';
}

function updateNav() {
  document.getElementById('btnPrev').disabled = currentSlide <= 0 || currentSlide > questions.length;
  document.getElementById('btnNext').style.display = currentSlide > questions.length ? 'none' : '';
}

/* ──── Option selection ──── */
function selectOption(btn, qid, isMulti) {
  const q = questions.find(x => x.id === qid);
  const val = btn.dataset.val;

  if (isMulti) {
    if (!responses[qid]) responses[qid] = [];
    const idx = responses[qid].indexOf(val);
    if (idx > -1) {
      responses[qid].splice(idx, 1);
      btn.classList.remove('selected');
    } else {
      if (q.max && responses[qid].length >= q.max) {
        showToast(`You can select up to ${q.max} options`);
        return;
      }
      responses[qid].push(val);
      btn.classList.add('selected');
    }
    if (responses[qid].length === 0) delete responses[qid];
  } else {
    // Deselect siblings
    document.querySelectorAll(`.opt-btn[data-qid="${qid}"]`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    responses[qid] = [val];
    // Auto-advance after short delay for single choice
    setTimeout(() => {
      if (currentSlide < questions.length) goToNext();
      else if (currentSlide === questions.length) submitSurvey();
    }, 350);
  }
  updateProgress();
}

/* ──── CSV Generation ──── */
function generateCSV() {
  const ts = new Date().toLocaleString();
  let csv = 'Question,Answer(s),Submitted At\n';
  questions.forEach((q, i) => {
    const ans = responses[q.id];
    const ansStr = ans && ans.length > 0 ? ans.join(' | ') : '(no answer)';
    const qText = '"' + q.text.replace(/"/g, '""') + '"';
    const aText = '"' + ansStr.replace(/"/g, '""') + '"';
    csv += qText + ',' + aText + ',' + (i === 0 ? '"' + ts + '"' : '') + '\n';
  });
  return csv;
}

function buildEmailBody() {
  const ts = new Date().toLocaleString();
  let body = '=== BIBLE STUDY SURVEY RESPONSE ===\n';
  body += 'Submitted: ' + ts + '\n\n';
  questions.forEach(q => {
    const ans = responses[q.id];
    const ansStr = ans && ans.length > 0 ? ans.join(', ') : '(no answer)';
    body += 'Q' + q.id + '. ' + q.text + '\n';
    body += '   \u2192 ' + ansStr + '\n\n';
  });
  body += '=================================\n';
  body += 'CSV DATA (paste into Excel or Google Sheets):\n\n';
  body += generateCSV();
  return body;
}

/* ──── Submit ──── */
async function submitSurvey() {
  // Find the OK button on last question to show spinner
  const lastBtn = document.querySelector(`#okBtn${questions.length}`);
  if (lastBtn) {
    lastBtn.disabled = true;
    lastBtn.innerHTML = '<span class="spinner-sm"></span> Submitting...';
  }

  try {
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        service_id: EMAILJS_SERVICE,
        template_id: EMAILJS_TEMPLATE,
        user_id: EMAILJS_PUBLIC_KEY,
        template_params: {
          email: TO_EMAIL,
          to_email: TO_EMAIL,
          subject: 'Bible Study Survey Response \u2014 ' + new Date().toLocaleDateString(),
          message: buildEmailBody()
        }
      })
    });

    if (res.ok) {
      goTo(questions.length + 1);
      launchConfetti();
    } else {
      throw new Error('Status ' + res.status);
    }
  } catch (err) {
    console.error('Submit error:', err);
    if (lastBtn) {
      lastBtn.disabled = false;
      lastBtn.innerHTML = 'OK <span class="btn-icon">&#10003;</span>';
    }
    showToast('Something went wrong. Please try again.');
  }
}

/* ──── Confetti ──── */
function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  const colors = ['#6C5CE7','#A29BFE','#00CEC9','#FD79A8','#FFEAA7','#55EFC4','#FF7675'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    const size = Math.random() * 8 + 4;
    p.style.cssText = `
      position:absolute; width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      left:${Math.random()*100}%; top:-10px;
      opacity:${Math.random()*0.7+0.3};
      animation: confetti-fall ${Math.random()*2+2}s ease-out forwards;
      animation-delay: ${Math.random()*0.5}s;
    `;
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.innerHTML = '', 4000);
}

/* ──── Keyboard nav ──── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') goToNext();
  if (e.key === 'ArrowUp') goToPrev();
  if (e.key === 'ArrowDown') goToNext();

  // Keyboard shortcuts for options
  if (currentSlide >= 1 && currentSlide <= questions.length) {
    const q = questions[currentSlide - 1];
    const keyIdx = e.key.toUpperCase().charCodeAt(0) - 65;
    if (keyIdx >= 0 && keyIdx < q.options.length) {
      const btn = document.querySelectorAll(`.slide.active .opt-btn`)[keyIdx];
      if (btn) selectOption(btn, q.id, q.type === 'multi');
    }
  }
});

/* ──── Helpers ──── */
function el(tag, attrs) {
  const e = document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* ──── Inject confetti keyframe ──── */
const style = document.createElement('style');
style.textContent = `
@keyframes confetti-fall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(${360+Math.random()*360}deg); opacity: 0; }
}`;
document.head.appendChild(style);

/* ──── Init ──── */
buildSlides();
updateProgress();
updateNav();
</script>
